<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendar — Callera Laser</title>
  <meta name="description" content="Agende sua sessão de depilação a laser na Callera Laser em Manaus-AM.">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicons/favicon-32.png?v=15">
  <link rel="shortcut icon" type="image/png" href="./assets/favicons/favicon-32.png?v=15">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/agendamento.css">
</head>
<body>
  <div id="app-header" data-partial="partials/header.html"></div>

  <main>
    <section class="agend-hero">
      <div class="container">
        <h1 class="agend-title">AGENDAR CONSULTA</h1>
      </div>
    </section>

    <section class="container agend-section">

      <!-- FORMULÁRIO -->
      <div id="bookingCard" class="booking-card">
        <form id="formAgend" novalidate>
          <div class="booking-grid">

            <div class="booking-field">
              <label for="agendNome">Nome completo *</label>
              <input id="agendNome" name="agendNome" type="text" placeholder="Seu nome completo" autocomplete="name" required>
            </div>

            <div class="booking-field">
              <label for="agendTelefone">WhatsApp *</label>
              <input id="agendTelefone" name="agendTelefone" type="tel" placeholder="(92) 99999-9999" autocomplete="tel" required>
            </div>

            <div class="booking-field full">
              <label for="agendEmail">E-mail <span class="optional">(opcional)</span></label>
              <input id="agendEmail" name="agendEmail" type="email" placeholder="seuemail@exemplo.com" autocomplete="email">
            </div>

            <div class="booking-field full">
              <label for="agendServico">Área / Serviço *</label>
              <select id="agendServico" name="agendServico" required>
                <option value="">Selecione o serviço...</option>
                <optgroup label="Rosto">
                  <option value="Buço">Buço</option>
                  <option value="Queixo">Queixo</option>
                  <option value="Barba">Barba</option>
                  <option value="Pescoço">Pescoço</option>
                  <option value="Rosto Completo">Rosto Completo</option>
                </optgroup>
                <optgroup label="Tronco">
                  <option value="Axila">Axila</option>
                  <option value="Abdômen">Abdômen</option>
                  <option value="Costas">Costas</option>
                  <option value="Peito">Peito</option>
                </optgroup>
                <optgroup label="Membros">
                  <option value="Braço Completo">Braço Completo</option>
                  <option value="Antebraço">Antebraço</option>
                  <option value="Perna Completa">Perna Completa</option>
                  <option value="Meia Perna">Meia Perna</option>
                  <option value="Coxa">Coxa</option>
                </optgroup>
                <optgroup label="Área íntima">
                  <option value="Virilha Simples">Virilha Simples</option>
                  <option value="Virilha Completa">Virilha Completa</option>
                  <option value="Glúteos">Glúteos</option>
                </optgroup>
                <optgroup label="Pacotes">
                  <option value="Pacote Feminino Completo">Pacote Feminino Completo</option>
                  <option value="Pacote Masculino Completo">Pacote Masculino Completo</option>
                </optgroup>
                <option value="Outro">Outro (descreva nas observações)</option>
              </select>
            </div>

            <div class="booking-field">
              <label for="agendData">Data preferida *</label>
              <input id="agendData" name="agendData" type="date" required>
            </div>

            <div class="booking-field">
              <label for="agendHorario">Horário preferido *</label>
              <select id="agendHorario" name="agendHorario" required>
                <option value="">Selecione...</option>
                <option value="09:00">09:00</option>
                <option value="09:30">09:30</option>
                <option value="10:00">10:00</option>
                <option value="10:30">10:30</option>
                <option value="11:00">11:00</option>
                <option value="11:30">11:30</option>
                <option value="12:00">12:00</option>
                <option value="12:30">12:30</option>
                <option value="13:00">13:00</option>
                <option value="13:30">13:30</option>
                <option value="14:00">14:00</option>
                <option value="14:30">14:30</option>
                <option value="15:00">15:00</option>
                <option value="15:30">15:30</option>
                <option value="16:00">16:00</option>
                <option value="16:30">16:30</option>
                <option value="17:00">17:00</option>
                <option value="17:30">17:30</option>
                <option value="18:00">18:00</option>
              </select>
            </div>

            <div class="booking-field full">
              <label for="agendObs">Observações <span class="optional">(opcional)</span></label>
              <textarea id="agendObs" name="agendObs" rows="3" placeholder="Ex.: primeira sessão, dúvidas sobre preparo, etc."></textarea>
            </div>

          </div>

          <div id="formError" class="booking-error" hidden></div>

          <div class="booking-foot">
            <p class="booking-note">* Campos obrigatórios. O agendamento será confirmado pela nossa equipe via WhatsApp.</p>
            <button id="submitAgend" class="btn btn-solid" type="submit">Confirmar Agendamento</button>
          </div>
        </form>
      </div>

      <!-- SUCESSO -->
      <div id="bookingSuccess" class="booking-success" hidden>
        <div class="check-circle">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#065F46" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2>Agendamento enviado!</h2>
        <p>Recebemos sua solicitação. Em breve nossa equipe entrará em contato pelo WhatsApp para confirmar o horário.</p>
        <div class="booking-success-actions">
          <button id="btnNewBooking" class="btn btn-outline" type="button">Fazer outro agendamento</button>
          <a class="btn btn-solid" href="https://wa.me/5592993242367?text=Ol%C3%A1!%20Acabei%20de%20agendar%20pelo%20site." target="_blank" rel="noopener">Falar no WhatsApp</a>
        </div>
      </div>

    </section>
  </main>

  <div data-partial="partials/footer.html"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/menu-cats.js"></script>
  <script src="js/search.js"></script>
  <script src="js/cart-badge.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/agendamento.js"></script>
</body>
</html>
